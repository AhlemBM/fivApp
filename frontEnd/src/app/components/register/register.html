<section class="auth-screen">

  <div class="auth-card">

    <div class="text-center mb-4">
      <h2 class="auth-title">إنشاء حساب</h2>
      <p class="auth-sub">
        ابدئي رحلتكِ معنا 💜
      </p>
    </div>

    <form (ngSubmit)="register()">

      <div class="mb-3">
        <label class="form-label">الاسم</label>

        <input
          type="text"
          class="form-control"
          [(ngModel)]="formData.firstName"
          name="firstName"
          placeholder="اسمكِ"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">البريد الإلكتروني</label>

        <input
          type="email"
          class="form-control"
          [(ngModel)]="formData.email"
          name="email"
          placeholder="example@gmail.com"
        />
      </div>

      <div class="mb-4">
        <label class="form-label">كلمة المرور</label>

        <input
          type="password"
          class="form-control"
          [(ngModel)]="formData.mdp"
          name="mdp"
          placeholder="********"
        />
      </div>

      <button
        type="submit"
        class="btn btn-soft w-100"
        [disabled]="loading"
      >
        {{ loading ? 'Loading...' : 'إنشاء حساب' }}
      </button>

    </form>

    <div
      *ngIf="message"
      class="alert alert-info mt-3"
    >
      {{ message }}
    </div>

    <div class="text-center mt-3">
      <a routerLink="/login">
        لديكِ حساب بالفعل؟
      </a>
    </div>

  </div>

</section>
